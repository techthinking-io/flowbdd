<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Suite Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({startOnLoad:true});
    </script>
    <script src="https://kit.fontawesome.com/d298eef3d4.js" crossorigin="anonymous"></script>
    <!-- This is for coloured syntax highlighting. For this to work we'd have to copy the css and js across to the temp dir.
         1. we can get from a cdn
         2. is it a good idea to have css/js files? Kinda neat just having one file.
     -->
<!--    <link href="prism.css" rel="stylesheet" /> -->
</head>
<body>
<!-- see above notes -->
<!--<script src="prism.js"></script>-->
<section class="section">
    <div class="container">
        <div th:replace="fragments :: header"></div>
        
        <div id="notificationArea" class="mt-4"></div>

        <nav class="breadcrumb has-arrow-separator" aria-label="breadcrumbs">
            <ul>
                <li class="is-active"><a href="#" aria-current="page" th:text="${testSuite.name}"/></li>
            </ul>
        </nav>

        <div class="pb-6">
            <h1 class="title">
                <span class="has-text-success">Feature: </span>
                <span class="white-space: pre-wrap" th:text="${testSuite.title}"/>
                <button th:if="${isServer}" class="button is-small is-success is-light is-pulled-right"
                        th:attr="onclick=|runTest('${testSuite.className}', null)|">
                    <span class="icon"><i class="fas fa-play"></i></span>
                    <span>Run All</span>
                </button>
            </h1>

            <div th:if="${isServer}" class="box mt-4">
                <div id="aiToggleHeader" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center;" onclick="toggleAiAssistant()">
                    <label class="label mb-0" style="cursor: pointer;">Ask AI about this JSON</label>
                    <span id="aiToggleIcon" class="icon"><i class="fas fa-chevron-down"></i></span>
                </div>
                <div id="aiAssistantBody" style="display: none; margin-top: 1rem;">
                    <div class="field">
                        <div class="control">
                            <textarea id="aiQuestion" class="textarea" placeholder="e.g. Why did this test fail? Or, summarise the scenarios."></textarea>
                        </div>
                    </div>
                    <div class="field is-grouped">
                        <div class="control">
                            <button class="button is-info" th:attr="onclick=|askAi('${testSuite.className}')|">Ask ChatGPT</button>
                        </div>
                    </div>
                    <div id="aiResponseArea" class="mt-4" style="display: none;">
                        <div class="notification is-light">
                            <button class="delete" onclick="this.parentElement.parentElement.style.display='none'"></button>
                            <div id="aiResponseContent" class="content"></div>
                        </div>
                    </div>
                </div>
            </div>

            <h2 class="subtitle" th:if="${testSuite.notes != null}">
                <span th:each="note : ${testSuite.notes.textNotes}">
                    <p>
                        <span style="white-space: pre-wrap" th:text="${note}"></span>
                    </p>
                </span>
            </h2>
        </div> <!-- end title -->
        <div class="content pb-4" th:each="testCase : ${testCases}">
            <h4 class="title">
                <span class="icon-text">
                  <span class="icon has-text-success" th:style="${isServer ? 'cursor: pointer;' : ''}"
                        th:attr="onclick=${isServer and testCase.method != null} ? |runTest('${testCase.clazz.fullyQualifiedName}', '${testCase.method.name}')| : ''">
                    <i class="far fa-play-circle" th:title="${isServer ? 'Re-run this test' : ''}"></i>
                  </span>
                </span>
                <span class="has-text-success">Scenario: </span>
                <span th:text="${testCase.method != null ? testCase.method.wordify : 'Unknown Method'} + ' (' + ${testCase.status} + ')'"/>
            </h4>
            <p style="white-space: pre-wrap" th:text="${testCase.wordify}"></p>

            <span th:if="${testCase.notes != null and testCase.notes.textNotes != null}">
                <span th:each="note : ${testCase.notes.textNotes}">
                    <p>
                        <span>Note: </span>
                        <span style="white-space: pre-wrap" class="green" th:text="${note}"></span>
                    </p>
                </span>
            </span>
            <span th:if="${testCase.notes != null}">
                <span th:each="diagram : ${testCase.notes.diagrams}">
                    <span class="mermaid" style="white-space: pre-wrap" th:text="${diagram}" ></span>
                </span>
            </span>
        </div>
    </div><!-- end container -->
</section>

<script th:if="${isServer}">
    function toggleAiAssistant() {
        const body = document.getElementById('aiAssistantBody');
        const icon = document.getElementById('aiToggleIcon').querySelector('i');
        if (body.style.display === 'none') {
            body.style.display = 'block';
            icon.classList.remove('fa-chevron-down');
            icon.classList.add('fa-chevron-up');
        } else {
            body.style.display = 'none';
            icon.classList.remove('fa-chevron-up');
            icon.classList.add('fa-chevron-down');
        }
    }

    async function runTest(className, methodName) {
        const notify = document.getElementById('notificationArea');
        notify.innerHTML = `
            <div class="notification is-info is-light">
                <button class="delete" onclick="this.parentElement.remove()"></button>
                Running test ${methodName ? methodName : className}...
            </div>
        `;

        try {
            const res = await fetch('/api/tests/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ className, methodName })
            });
            if (!res.ok) throw new Error('Failed to run test');
            const result = await res.json();
            
            notify.innerHTML = `
                <div class="notification is-success is-light">
                    <button class="delete" onclick="this.parentElement.remove()"></button>
                    <strong>Test Run Complete!</strong><br/>
                    Passed: ${result.summary.passed} / Total: ${result.summary.tests}<br/>
                    <a href="javascript:location.reload()">Reload page to see updated results</a>
                </div>
            `;
        } catch (err) {
            console.error(err);
            notify.innerHTML = `
                <div class="notification is-danger is-light">
                    <button class="delete" onclick="this.parentElement.remove()"></button>
                    <strong>Error:</strong> Failed to execute test.
                </div>
            `;
        }
    }

    async function askAi(className) {
        const question = document.getElementById('aiQuestion').value;
        const responseArea = document.getElementById('aiResponseArea');
        const responseContent = document.getElementById('aiResponseContent');

        if (!question) {
            alert('Please enter a question.');
            return;
        }

        responseArea.style.display = 'block';
        responseContent.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Thinking...</p>';

        try {
            const res = await fetch('/api/ai/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ className, question })
            });
            const result = await res.json();
            
            if (result.error) {
                responseContent.innerHTML = `<div class="notification is-danger is-light">${result.error}</div>`;
            } else {
                // simple markdown-ish formatting for newlines
                const formattedAnswer = result.answer.replace(/\n/g, '<br/>');
                responseContent.innerHTML = `<p>${formattedAnswer}</p>`;
            }
        } catch (err) {
            console.error(err);
            responseContent.innerHTML = `<div class="notification is-danger is-light">Error calling AI service.</div>`;
        }
    }
</script>

</body>

<footer th:replace="fragments :: footer"></footer>
</html>
